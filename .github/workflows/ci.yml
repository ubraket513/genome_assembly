name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python ${{ matrix.python-version }} (pure-Python backend)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: python -m pip install -e .
      - name: Run tests (native/cython parity auto-skips)
        run: python -m unittest discover -s tests -v

  rust:
    name: Rust crate (test, clippy, fmt)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: native/genome_assembly_native
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Format check
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cargo test

  integration:
    name: Full parity (Cython + native built)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: dtolnay/rust-toolchain@stable
      - name: Install with perf, native, and agent extras
        run: python -m pip install -e '.[perf,native,agent]'
      - name: Build Cython accelerator
        run: python setup.py build_ext --inplace
      - name: Build native extension
        run: maturin develop --release --manifest-path native/genome_assembly_native/Cargo.toml
      - name: Run full test suite (all backends)
        run: python -m unittest discover -s tests -v
