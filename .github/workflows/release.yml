name: Release artifacts

# Builds distributable artifacts. Publishing to PyPI is intentionally left as a
# manual step so a human authorizes that outward, irreversible action.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  python-dist:
    name: Pure-Python sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*

  native-wheels:
    name: Native wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist --manifest-path native/genome_assembly_native/Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: native-wheels-${{ matrix.os }}
          path: dist/*
